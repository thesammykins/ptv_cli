name: Update embedded PTV v3 snapshot

on:
  schedule:
    - cron: "17 15 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-v3-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25.12"
          cache: true

      - name: Generate normalized snapshot
        run: go run ./tools/ptv-v3-snapshot --output internal/v3static/data/snapshot.json
        env:
          PTV_API_KEY: ${{ secrets.PTV_API_KEY }}
          PTV_API_USERID: ${{ secrets.PTV_API_USERID }}

      - name: Validate snapshot and build
        run: |
          go test ./internal/v3static ./tools/ptv-v3-snapshot
          go build ./...
          go vet ./...

      - name: Open update pull request when data changed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- internal/v3static/data/snapshot.json; then
            echo "PTV v3 snapshot unchanged"
            exit 0
          fi
          branch="automation/ptv-v3-snapshot-${GITHUB_RUN_ID}"
          git switch --create "$branch"
          git add internal/v3static/data/snapshot.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: refresh embedded PTV v3 snapshot"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base "${GITHUB_REF_NAME:-main}" \
            --head "$branch" \
            --title "data: refresh embedded PTV v3 snapshot" \
            --body "Automated refresh of the normalized PTV Timetable API v3 enrichment snapshot.\n\nThe snapshot is supplementary metadata only and retains this attribution:\nSource: Licensed from Public Transport Victoria under a Creative Commons Attribution 4.0 International Licence.\n\nPlease review the generated hash, record counts, and diff before merging."
